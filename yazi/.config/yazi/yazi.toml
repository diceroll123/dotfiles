[mgr]
show_hidden = true

[[plugin.prepend_fetchers]]
id    = "git"
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
id    = "git"
url   = "*/"
run   = "git"
group = "git"

[[plugin.prepend_previewers]]
mime = "application/x-bittorrent"
run = "torrent-preview"

[[plugin.prepend_previewers]]
url = "*.csv"
run = "rich-preview"

[[plugin.prepend_previewers]]
url = "*.md"
run = "rich-preview"

[[plugin.prepend_previewers]]
url = "*.rst"
run = "rich-preview"

[[plugin.prepend_previewers]]
url = "*.ipynb"
run = "rich-preview"

[[plugin.prepend_previewers]]
url = "*.json"
run = "rich-preview"
